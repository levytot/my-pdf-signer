<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Broadband Service Agreement</title>
    <style>
        body {
            font-family: SimSun, sans-serif;
            margin: 40px;
            font-size: 12px;
        }
        .container {
            width: 100%;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 18px;
            font-weight: bold;
        }
        .content {
            line-height: 1.8;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            margin-bottom: 15px;
        }
        .info-table th, .info-table td {
            border: 1px solid #333;
            padding: 8px;
            text-align: left;
        }
        .info-table th {
            background-color: #f2f2f2;
        }
        .footer {
            margin-top: 40px;
        }
        #signature-area {
            border: 1px dashed #ccc;
            height: 100px;
            width: 250px;
            margin-top: 10px;
            padding: 5px;
            color: #aaa;
            text-align: center;
            line-height: 100px;
            position: relative;
        }
        .signature-marker {
            position: absolute;
            color: white;
            font-size: 1px;
            left: 0;
            top: 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>宽带业务受理单</h1>
        <p>订单号：<span th:text="${orderId}">ORDER123456</span></p>
    </div>

    <div class="content">
        <p>尊敬的客户 <strong th:text="${customerName}">[客户姓名]</strong>,</p>
        <p>感谢您选择我们的宽带服务。以下是您的业务详情：</p>

        <table class="info-table">
            <tr>
                <th>项目</th>
                <th>详情</th>
            </tr>
            <tr>
                <td>客户姓名</td>
                <td th:text="${customerName}">[客户姓名]</td>
            </tr>
            <tr>
                <td>安装地址</td>
                <td th:text="${address}">[安装地址]</td>
            </tr>
            <tr>
                <td>联系电话</td>
                <td th:text="${phone}">[联系电话]</td>
            </tr>
            <tr>
                <td>宽带套餐</td>
                <td th:text="${productName}">[200M 畅享套餐]</td>
            </tr>
            <tr>
                <td>月费</td>
                <td th:text="${monthlyFee}">[￥129.00]</td>
            </tr>
        </table>

        <p>请您确认以上信息无误，并在下方签名确认。</p>
    </div>

    <div class="footer">
        <p>客户签名:</p>
        <div id="signature-area">
            <span class="signature-marker">@@SIGNATURE_MARKER@@</span>
            Signature Area
        </div>
        <p>日期：<span th:text="${signDate}">[YYYY-MM-DD]</span></p>
    </div>
</div>
</body>
</html>
